<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Weather Forecast</mat-card-title>
    <mat-card-subtitle *ngIf="!loading && !error">
      Total Forecast Records: {{ forecasts.length }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="loading-container" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loading...</p>
    </div>

    <div class="error-container" *ngIf="error">
      <mat-chip color="warn" highlighted>{{ error }}</mat-chip>
    </div>

    <table
      *ngIf="!loading && !error"
      mat-table
      [dataSource]="forecasts"
      class="weather-table"
    >
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let forecast">{{ forecast.date | date: 'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="temperatureC">
        <th mat-header-cell *matHeaderCellDef>Temperature (C)</th>
        <td
          mat-cell
          *matCellDef="let forecast"
          [class.hot-row]="isHot(forecast.temperatureC)"
        >
          {{ forecast.temperatureC }}°C
        </td>
      </ng-container>

      <ng-container matColumnDef="temperatureF">
        <th mat-header-cell *matHeaderCellDef>Temperature (F)</th>
        <td mat-cell *matCellDef="let forecast">{{ forecast.temperatureF }}°F</td>
      </ng-container>

      <ng-container matColumnDef="summary">
        <th mat-header-cell *matHeaderCellDef>Summary</th>
        <td mat-cell *matCellDef="let forecast">{{ forecast.summary }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [class.hot-row]="isHot(row.temperatureC)"></tr>
    </table>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="loadForecasts()" [disabled]="loading">
      Refresh
    </button>
  </mat-card-actions>
</mat-card>
